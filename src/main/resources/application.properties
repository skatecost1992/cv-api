server.port=${PORT:8085}

spring.datasource.url=jdbc:h2:mem:cvdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Claves RSA (Base64) para descifrar las credenciales que envia el cliente.
# IMPORTANTE: en un sistema real la clave privada debe ir en una variable de entorno
# o gestor de secretos y NUNCA commitearse. Aqui se deja por defecto para que el demo
# funcione sin configuracion extra; se puede sobrescribir con las variables de entorno
# RSA_PUBLIC_KEY y RSA_PRIVATE_KEY.
rsa.public-key=${RSA_PUBLIC_KEY:}
rsa.private-key=${RSA_PRIVATE_KEY:}
