server.port=${PORT:8085}

spring.datasource.url=jdbc:h2:mem:cvdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Claves RSA (Base64) para descifrar las credenciales que envia el cliente.
# La clave PUBLICA no es secreta: se puede commitear (se usa solo para cifrar).
rsa.public-key=${RSA_PUBLIC_KEY:}
# La clave PRIVADA es OBLIGATORIA via variable de entorno RSA_PRIVATE_KEY (sin valor
# por defecto: NO se commitea). El arranque falla si no esta definida (fail-fast).
rsa.private-key=${RSA_PRIVATE_KEY}
