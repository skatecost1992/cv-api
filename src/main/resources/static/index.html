<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Hoja de Vida</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app"><div class="loading">Cargando hoja de vida...</div></div>

<button class="print-btn" id="printBtn" title="Imprimir o guardar como PDF">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    <span>Imprimir</span>
</button>

<div class="admin-panel" id="adminPanel">
    <div class="admin-content">
        <button class="admin-close" id="adminClose">&times;</button>
        <h2>Administrar CV</h2>
        <div class="tab-bar" id="tabBar"></div>
        <div id="tabContent"></div>
    </div>
</div>

<script>
const API = "";
const API_KEY = "app-cv";
// Valor de la credencial CIFRADO con RSA-OAEP(SHA-256). El secreto en claro NO
// está aquí: esto es un texto cifrado que solo el servidor puede descifrar con
// su clave privada. (Ver endpoint /public-key para cifrar otros valores.)
const API_VALUE = "wIRE5U/rq+vInaTX5RYjEZQA9jLTn8p7hCZ7bpSV2ONUvw+vvn+tJSmI8Dg8l3ZpQK7Q1hkeULTfsqufDyQUbpn9Z/YErm2+VPM3/xO+H+22VpeTQr4LG30dpKnTdxnO+1jwWfpaAWuf6irUHVpbbeFUprfCO0apSOQ/3QaN+qJLLx+BzqQ14cBlJhHsNoFYu+bdd9sg2W/3gfiN3QDAZnKOVDpvuFHErju8XAUfptiGqpzOl+yOv3zvbADisSKeTXmzKlktKwouSwfZmpqmvWucRcNSb7lXJHsVrjfCvO14740j9r9gOVnj0BY8VPesZTqzNT+8PZkwvXfDsqSpHA==";
const G = id => document.getElementById(id);
const ce = (tag, attrs = {}, children = []) => {
    const el = document.createElement(tag);
    Object.entries(attrs).forEach(([k, v]) => {
        if (k === "className") el.className = v;
        else if (k === "innerHTML") el.innerHTML = v;
        else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
        else el.setAttribute(k, v);
    });
    children.forEach(c => el.appendChild(typeof c === "string" ? document.createTextNode(c) : c));
    return el;
};
const Qa = (s, p) => [...(p || document).querySelectorAll(s)];

const LEVEL_MAP = { nativo:5, nativa:5, c2:5, c1:4, b2:3, b1:2, a2:1, a1:1, avanzado:4, intermedio:3, b\u00e1sico:1, b\u00e1sica:1, experto:5, expert:5, advanced:4, intermediate:3, beginner:1, native:5 };
function levelToPercent(lvl) {
    const v = (lvl || "").toLowerCase().trim();
    if (LEVEL_MAP[v] !== undefined) return LEVEL_MAP[v] * 20;
    const n = parseInt(lvl);
    if (!isNaN(n)) return Math.min(Math.max(n, 0), 100);
    return 60;
}
function levelToDots(lvl) {
    const v = (lvl || "").toLowerCase().trim();
    return LEVEL_MAP[v] !== undefined ? LEVEL_MAP[v] : 3;
}

const tabs = [
    { id: "personal", label: "Info Personal" },
    { id: "education", label: "Formación" },
    { id: "experience", label: "Experiencia" },
    { id: "languages", label: "Idiomas" },
    { id: "certifications", label: "Certificaciones" },
    { id: "programming", label: "Prog. Knowledge" },
    { id: "testing", label: "Testing Knowledge" },
    { id: "ai", label: "IA" },
];

let state = { personal: null, educations: [], experiences: [], languages: [], certifications: [], programming: [], testing: [], aiknowledge: [] };

async function api(method, path, body) {
    const opts = { method, headers: { "Content-Type": "application/json", "X-API-Key": API_KEY, "X-API-Value": API_VALUE } };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(API + path, opts);
    if (r.status === 401) { alert("Error de autenticaci\u00f3n API"); return null; }
    if (method === "DELETE") return null;
    return r.json();
}

async function loadAll() {
    const [personal, education, experiences, languages, certifications, programming, testing, aiknowledge] = await Promise.all([
        api("GET", "/api/personal-info").catch(() => null),
        api("GET", "/api/educations"),
        api("GET", "/api/experiences"),
        api("GET", "/api/languages"),
        api("GET", "/api/certifications"),
        api("GET", "/api/programming-knowledge"),
        api("GET", "/api/testing-knowledge"),
        api("GET", "/api/ai-knowledge"),
    ]);
    state = { personal, educations: education || [], experiences: experiences || [], languages: languages || [], certifications: certifications || [], programming: programming || [], testing: testing || [], aiknowledge: aiknowledge || [] };
    render();
    renderAdminLists();
}

function render() {
    const app = G("app");
    const p = state.personal;
    const initials = p?.name ? p.name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase() : "CV";
    app.innerHTML = "";

    const wrapper = ce("div", { className: "cv-wrapper" });

    const sidebar = ce("div", { className: "sidebar" });
    sidebar.appendChild(ce("div", {}, [
        ce("div", { className: "avatar" }, [initials]),
        ce("h1", {}, [p?.name || "Tu Nombre"]),
        ce("div", { className: "title" }, [p?.title || ""]),
    ]));

    const contact = ce("div", { className: "contact-section" });
    const contactItems = [
        p?.email ? ["email", p.email, "mailto:" + p.email] : null,
        p?.phone ? ["phone", p.phone, "tel:" + p.phone] : null,
        p?.location ? ["location", p.location, null] : null,
        p?.linkedin ? ["linkedin", p.linkedin, p.linkedin.startsWith("http") ? p.linkedin : "https://" + p.linkedin] : null,
        p?.github ? ["github", p.github, p.github.startsWith("http") ? p.github : "https://" + p.github] : null,
        p?.website ? ["website", p.website, p.website.startsWith("http") ? p.website : "https://" + p.website] : null,
    ].filter(Boolean);
    const svgs = {
        email: "<svg width=16 height=16 viewBox=\"0 0 24 24\" fill=none stroke=currentColor stroke-width=2 stroke-linecap=round stroke-linejoin=round><rect x=2 y=4 width=20 height=16 rx=2/><path d=\"M22 4L12 13 2 4\"/></svg>",
        phone: "<svg width=16 height=16 viewBox=\"0 0 24 24\" fill=none stroke=currentColor stroke-width=2 stroke-linecap=round stroke-linejoin=round><path d=\"M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z\"/></svg>",
        location: "<svg width=16 height=16 viewBox=\"0 0 24 24\" fill=none stroke=currentColor stroke-width=2 stroke-linecap=round stroke-linejoin=round><path d=\"M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z\"/><circle cx=12 cy=10 r=3/></svg>",
        linkedin: "<svg width=16 height=16 viewBox=\"0 0 24 24\" fill=none stroke=currentColor stroke-width=2 stroke-linecap=round stroke-linejoin=round><path d=\"M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6z\"/><rect x=2 y=9 width=4 height=12/><circle cx=4 cy=4 r=2/></svg>",
        github: "<svg width=16 height=16 viewBox=\"0 0 24 24\" fill=none stroke=currentColor stroke-width=2 stroke-linecap=round stroke-linejoin=round><path d=\"M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22\"/></svg>",
        website: "<svg width=16 height=16 viewBox=\"0 0 24 24\" fill=none stroke=currentColor stroke-width=2 stroke-linecap=round stroke-linejoin=round><circle cx=12 cy=12 r=10/><line x1=2 y1=12 x2=22 y2=12/><path d=\"M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z\"/></svg>",
    };
    contactItems.forEach(([type, value, href]) => {
        const row = ce("div", { className: "contact-row" });
        row.innerHTML = svgs[type] || "";
        if (href) { row.appendChild(ce("a", { href, target: "_blank" }, [value])); }
        else { row.appendChild(ce("span", {}, [value])); }
        contact.appendChild(row);
    });
    sidebar.appendChild(contact);

    if (state.programming.length || state.testing.length || state.aiknowledge.length || state.languages.length) {
        sidebar.appendChild(ce("div", { className: "sidebar-divider" }));
    }

    if (state.programming.length) {
        const sec = ce("div");
        sec.appendChild(ce("h2", {}, ["Programaci\u00f3n"]));
        state.programming.forEach(s => {
            const pct = levelToPercent(s.level);
            sec.appendChild(ce("div", { className: "skill-bar-group" }, [
                ce("div", { className: "skill-bar-header" }, [
                    ce("span", { className: "skill-name" }, [s.name]),
                    ce("span", { className: "skill-lvl" }, [s.level]),
                ]),
                ce("div", { className: "skill-bar-track" }, [
                    ce("div", { className: "skill-bar-fill", style: "width:" + pct + "%" }),
                ]),
            ]));
        });
        sidebar.appendChild(sec);
    }

    if (state.testing.length) {
        const sec = ce("div");
        sec.appendChild(ce("h2", {}, ["Pruebas"]));
        state.testing.forEach(s => {
            const pct = levelToPercent(s.level);
            sec.appendChild(ce("div", { className: "skill-bar-group" }, [
                ce("div", { className: "skill-bar-header" }, [
                    ce("span", { className: "skill-name" }, [s.name]),
                    ce("span", { className: "skill-lvl" }, [s.level]),
                ]),
                ce("div", { className: "skill-bar-track" }, [
                    ce("div", { className: "skill-bar-fill", style: "width:" + pct + "%" }),
                ]),
            ]));
        });
        sidebar.appendChild(sec);
    }

    if (state.aiknowledge.length) {
        const sec = ce("div");
        sec.appendChild(ce("h2", {}, ["IA"]));
        state.aiknowledge.forEach(s => {
            const pct = levelToPercent(s.level);
            sec.appendChild(ce("div", { className: "skill-bar-group" }, [
                ce("div", { className: "skill-bar-header" }, [
                    ce("span", { className: "skill-name" }, [s.name]),
                    ce("span", { className: "skill-lvl" }, [s.level]),
                ]),
                ce("div", { className: "skill-bar-track" }, [
                    ce("div", { className: "skill-bar-fill", style: "width:" + pct + "%" }),
                ]),
            ]));
        });
        sidebar.appendChild(sec);
    }

    if (state.languages.length) {
        const sec = ce("div");
        sec.appendChild(ce("h2", {}, ["Idiomas"]));
        state.languages.forEach(l => {
            const dots = levelToDots(l.level);
            sec.appendChild(ce("div", { className: "lang-row" }, [
                ce("span", { className: "lang-name" }, [l.name]),
                ce("div", { className: "lang-meta" }, [
                    l.level ? ce("span", { className: "lang-level" }, [l.level]) : null,
                    ce("div", { className: "lang-dots" },
                        [1,2,3,4,5].map(i => ce("div", { className: "lang-dot" + (i <= dots ? " filled" : "") }))
                    ),
                ]),
            ]));
        });
        sidebar.appendChild(sec);
    }

    const main = ce("div", { className: "main" });

    if (state.educations.length) {
        main.appendChild(ce("div", { className: "main-section" }, [
            ce("h2", {}, ["Formaci\u00f3n Profesional"]),
            ce("div", { className: "timeline" }, state.educations.map(e =>
                ce("div", { className: "timeline-item" }, [
                    ce("div", { className: "timeline-dot" }),
                    ce("div", { className: "timeline-date" }, [
                        e.startDate ? new Date(e.startDate).toLocaleDateString("es-ES", { year:"numeric", month:"short" }) : "",
                        e.startDate ? " \u2013 " : "",
                        e.endDate ? new Date(e.endDate).toLocaleDateString("es-ES", { year:"numeric", month:"short" }) : "Actualidad"
                    ]),
                    ce("div", { className: "timeline-company" }, [e.institution]),
                    ce("div", { className: "timeline-role" }, [e.degree]),
                    e.location ? ce("div", { className: "timeline-location" }, [e.location]) : null,
                    e.description ? ce("div", { className: "timeline-desc" }, [e.description]) : null,
                ])
            )),
        ]));
    }

    if (p?.summary) {
        main.appendChild(ce("div", { className: "main-section" }, [
            ce("h2", {}, ["Acerca de m\u00ed"]),
            ce("div", { className: "summary-text" }, [p.summary]),
        ]));
    }

    if (state.experiences.length) {
        main.appendChild(ce("div", { className: "main-section" }, [
            ce("h2", {}, ["Experiencia"]),
            ce("div", { className: "timeline" }, state.experiences.map(e =>
                ce("div", { className: "timeline-item" }, [
                    ce("div", { className: "timeline-dot" }),
                    ce("div", { className: "timeline-date" }, [
                        e.startDate ? new Date(e.startDate).toLocaleDateString("es-ES", { year:"numeric", month:"short" }) : "",
                        e.startDate ? " \u2013 " : "",
                        e.endDate ? new Date(e.endDate).toLocaleDateString("es-ES", { year:"numeric", month:"short" }) : "Actualidad"
                    ]),
                    ce("div", { className: "timeline-company" }, [e.company]),
                    ce("div", { className: "timeline-role" }, [e.role]),
                    e.location ? ce("div", { className: "timeline-location" }, [e.location]) : null,
                    e.description ? ce("div", { className: "timeline-desc" }, [e.description]) : null,
                ])
            )),
        ]));
    }

    if (state.certifications.length) {
        main.appendChild(ce("div", { className: "main-section" }, [
            ce("h2", {}, ["Certificaciones"]),
            ce("div", { className: "certs-grid" }, state.certifications.map(c =>
                ce("div", { className: "cert-card" }, [
                    ce("div", { className: "cert-name" }, [c.name]),
                    ce("div", { className: "cert-issuer" }, [c.issuer]),
                    c.date ? ce("div", { className: "cert-date" }, [new Date(c.date).toLocaleDateString("es-ES", { year:"numeric", month:"long" })]) : null,
                    c.description ? ce("div", { className: "cert-desc" }, [c.description]) : null,
                    c.url ? ce("a", { className: "cert-url", href: c.url, target: "_blank" }, ["Ver credencial \u2192"]) : null,
                ])
            )),
        ]));
    }

    wrapper.appendChild(sidebar);
    wrapper.appendChild(main);
    app.appendChild(wrapper);
}

function renderAdminLists() {
    const tabContent = G("tabContent");
    const tabBar = G("tabBar");
    tabBar.innerHTML = "";
    tabContent.innerHTML = "";

    tabs.forEach((tab, i) => {
        const btn = ce("button", {
            className: i === 0 ? "active" : "",
            onClick: () => { Qa(".admin-tab-content").forEach(e => e.classList.remove("active")); Qa(".tab-bar button").forEach(b => b.classList.remove("active")); btn.classList.add("active"); const el = G("tab-" + tab.id); if (el) el.classList.add("active"); }
        }, [tab.label]);
        tabBar.appendChild(btn);
    });

    const formMap = {
        personal: renderPersonalForm,
        education: renderListForm("educations", "Formaci\u00f3n", ["institution","degree","description","startDate","endDate","location","orderIndex"], { institution: "Instituci\u00f3n", degree: "T\u00edtulo / Grado", description: "Descripci\u00f3n", startDate: "Fecha inicio", endDate: "Fecha fin", location: "Ubicaci\u00f3n", orderIndex: "Orden" }),
        experience: renderListForm("experiences", "Empresa", ["company","role","description","startDate","endDate","location","orderIndex"], { company: "Empresa", role: "Rol", description: "Descripci\u00f3n", startDate: "Fecha inicio", endDate: "Fecha fin", location: "Ubicaci\u00f3n", orderIndex: "Orden" }),
        languages: renderListForm("languages", "Idioma", ["name","level"], { name: "Nombre", level: "Nivel" }),
        certifications: renderListForm("certifications", "Certificaci\u00f3n", ["name","issuer","date","url","description"], { name: "Nombre", issuer: "Emisor", date: "Fecha", url: "URL", description: "Descripci\u00f3n" }),
        programming: renderListForm("programming-knowledge", "Conocimiento", ["name","level"], { name: "Nombre", level: "Nivel" }),
        testing: renderListForm("testing-knowledge", "Conocimiento", ["name","level"], { name: "Nombre", level: "Nivel" }),
        ai: renderListForm("ai-knowledge", "IA", ["name","level"], { name: "Nombre", level: "Nivel" }),
    };

    tabs.forEach(tab => {
        const div = ce("div", { className: "admin-tab-content" + (tab.id === "personal" ? " active" : ""), id: "tab-" + tab.id });
        if (formMap[tab.id]) div.appendChild(formMap[tab.id]());
        tabContent.appendChild(div);
    });
}

function renderPersonalForm() {
    const div = ce("div");
    const p = state.personal || {};
    const fields = ["name","title","email","phone","location","summary","linkedin","github","website"];
    const labels = { name: "Nombre", title: "T\u00edtulo", email: "Email", phone: "Tel\u00e9fono", location: "Ubicaci\u00f3n", summary: "Resumen", linkedin: "LinkedIn", github: "GitHub", website: "Web" };
    fields.forEach(f => {
        div.appendChild(ce("label", {}, [labels[f]]));
        const isTextarea = f === "summary";
        const el = isTextarea ? ce("textarea", { id: "pf-" + f }) : ce("input", { id: "pf-" + f, type: f === "email" ? "email" : "text" });
        el.value = p[f] || "";
        div.appendChild(el);
    });
    div.appendChild(ce("button", { className: "btn", onClick: async () => {
        const body = {};
        fields.forEach(f => body[f] = G("pf-" + f).value);
        const r = await api("PUT", "/api/personal-info", body);
        if (r) { state.personal = r; render(); renderAdminLists(); }
    }}, ["Guardar"]));
    return div;
}

function renderListForm(entity, singular, fields, labels) {
    const container = ce("div");
    const formDiv = ce("div", { style: "background:#f8fafc;padding:14px;border-radius:8px;margin-bottom:14px;" });
    const inputs = {};
    fields.forEach(f => {
        formDiv.appendChild(ce("label", {}, [labels[f]]));
        const inp = ce("input", { id: "nf-" + entity + "-" + f, type: "text" });
        formDiv.appendChild(inp);
        inputs[f] = inp;
    });
    const listDiv = ce("div", { id: "list-" + entity });
    const addBtn = ce("button", { className: "btn", onClick: async () => {
        const body = {};
        fields.forEach(f => body[f] = inputs[f].value);
        const r = await api("POST", "/api/" + entity, body);
        if (r) { fields.forEach(f => inputs[f].value = ""); await loadAll(); }
    }}, ["Agregar " + singular]);
    formDiv.appendChild(addBtn);
    container.appendChild(formDiv);
    container.appendChild(listDiv);

    const renderList = () => {
        const key = entity.replace(/-/g, "");
        const items = state[key + (key.endsWith("e") ? "s" : "s")] || state[key] || [];
        listDiv.innerHTML = "";
        items.forEach(item => {
            const row = ce("div", { className: "admin-item" }, [
                ce("span", {}, [fields.map(f => item[f]).filter(Boolean).join(" \u2013 ") || "(sin datos)"]),
                ce("div", { className: "admin-item-actions" }, [
                    ce("button", { onClick: async () => {
                        const newVals = {};
                        for (const f of fields) { const v = prompt(labels[f] + " (nuevo valor):", item[f] || ""); if (v !== null) newVals[f] = v; }
                        if (Object.keys(newVals).length) {
                            await api("PUT", "/api/" + entity + "/" + item.id, { ...item, ...newVals });
                            await loadAll();
                        }
                    }}, ["\u270f"]),
                    ce("button", { onClick: async () => {
                        if (confirm("\u00bfEliminar?")) { await api("DELETE", "/api/" + entity + "/" + item.id); await loadAll(); }
                    }}, ["\ud83d\uddd1"]),
                ]),
            ]);
            listDiv.appendChild(row);
        });
    };
    renderList();
    return container;
}

G("printBtn").addEventListener("click", () => window.print());

// Acceso al panel de administración: añade #admin a la URL (ej: tu-sitio.com/#admin)
function syncAdminFromHash() { G("adminPanel").classList.toggle("open", location.hash === "#admin"); }
function closeAdmin() { if (location.hash === "#admin") history.replaceState(null, "", location.pathname + location.search); G("adminPanel").classList.remove("open"); }
window.addEventListener("hashchange", syncAdminFromHash);
G("adminClose").addEventListener("click", closeAdmin);
G("adminPanel").addEventListener("click", e => { if (e.target === G("adminPanel")) closeAdmin(); });
syncAdminFromHash();

loadAll();
</script>
</body>
</html>
